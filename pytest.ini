[pytest]
addopts = -m "not slow" --ignore=tests/e2e
testpaths = tests
markers =
    slow: long-running integration and smoke tests (use pytest -m slow or pytest tests/e2e to run)
filterwarnings =
    ignore:Pydantic V1 style `@validator` validators are deprecated:DeprecationWarning:mlflow.gateway.config
    ignore:Pydantic V1 style `@root_validator` validators are deprecated:DeprecationWarning:mlflow.gateway.config
    ignore:Support for class-based `config` is deprecated, use ConfigDict instead:DeprecationWarning:pydantic._internal._config
