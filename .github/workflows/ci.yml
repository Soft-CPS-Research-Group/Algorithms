name: CI

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint / syntax check
        run: python -m compileall run_experiment.py algorithms utils
      - name: Run tests
        run: pytest

  docker:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: calof/opeva_simulator
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=ref,event=tag
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
      - name: Build and push Docker image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=calof/opeva_simulator:buildcache
          cache-to: type=registry,ref=calof/opeva_simulator:buildcache,mode=max

  sif:
    if: github.event_name == 'push'
    needs: docker
    runs-on: ubuntu-latest
    env:
      DOCKER_TAGS: ${{ needs.docker.outputs.tags }}
      SOURCE_IMAGE_REPO: calof/opeva_simulator
      SIF_ARTIFACT_REPO: calof/opeva_simulator_sif

    steps:
      - uses: actions/checkout@v4

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Install ORAS CLI
        run: |
          ORAS_VERSION="1.2.3"
          curl -sSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" -o oras.tgz
          tar -xzf oras.tgz oras
          sudo mv oras /usr/local/bin/oras
          oras version

      - name: Log in to Docker Hub (for ORAS push)
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | oras login docker.io --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and publish SIF OCI artifacts
        run: |
          set -euo pipefail

          mapfile -t refs < <(printf '%s\n' "${DOCKER_TAGS}" | sed '/^$/d')
          if [ "${#refs[@]}" -eq 0 ]; then
            echo "No Docker tags received from metadata output."
            exit 1
          fi

          declare -A seen
          for ref in "${refs[@]}"; do
            if [[ "${ref}" != "${SOURCE_IMAGE_REPO}:"* ]]; then
              continue
            fi
            tag="${ref#${SOURCE_IMAGE_REPO}:}"
            if [ -z "${tag}" ] || [ -n "${seen[${tag}]:-}" ]; then
              continue
            fi
            seen["${tag}"]=1

            echo "Building SIF for ${SOURCE_IMAGE_REPO}:${tag}"
            rm -f simulator.sif
            apptainer build --force simulator.sif "docker://${SOURCE_IMAGE_REPO}:${tag}"

            echo "Publishing OCI artifact ${SIF_ARTIFACT_REPO}:${tag}"
            oras push "docker.io/${SIF_ARTIFACT_REPO}:${tag}" \
              --artifact-type application/vnd.opeva.sif.v1+file \
              simulator.sif:application/vnd.opeva.sif
          done
