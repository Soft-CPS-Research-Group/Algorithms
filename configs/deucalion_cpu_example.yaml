# -----------------------------------------------------------------------------
# Example config for CPU runs.
#
# Dataset usage:
# 1) Put your dataset folder under ./datasets/<your_dataset_name>/
# 2) Ensure schema exists at ./datasets/<your_dataset_name>/schema.json
# 3) Update BOTH simulator.dataset_name and simulator.dataset_path below
# -----------------------------------------------------------------------------
metadata:
  experiment_name: "deucalion_cpu_example"
  run_name: "CPU Example Run"

runtime:
  log_dir: null
  mlflow_uri: null

tracking:
  mlflow_enabled: true
  log_level: "INFO"
  log_frequency: 1

checkpointing:
  resume_training: false
  checkpoint_run_id: null
  checkpoint_artifact: "latest_checkpoint.pth"
  use_best_checkpoint_artifact: false
  reset_replay_buffer: false
  freeze_pretrained_layers: false
  fine_tune: false
  checkpoint_interval: 5000

simulator:
  dataset_name: citylearn_charging_constraints_demo
  dataset_path: /data/datasets/citylearn_charging_constraints_demo/schema.json
  central_agent: false
  reward_function: RewardFunction

training:
  seed: 22
  end_initial_exploration_time_step: 100
  end_exploration_time_step: 200
  steps_between_training_updates: 5
  target_update_interval: 2

topology:
  num_agents: null
  observation_dimensions: null
  action_dimensions: null
  action_space: null

algorithm:
  name: "MADDPG"
  hyperparameters:
    gamma: 0.99
  networks:
    actor:
      class: "Actor"
      layers: [512, 256, 128]
      lr: 1.0e-4
    critic:
      class: "Critic"
      layers: [512, 256, 128]
      lr: 1.0e-3
  replay_buffer:
    class: "MultiAgentReplayBuffer"
    capacity: 50000
    batch_size: 256
  exploration:
    strategy: "GaussianNoise"
    params:
      bias: 0.3
      sigma: 0.2
      decay: 0.995
      gamma: 0.99
      tau: 0.001

# Optional block used by the Deucalion worker.
# It is ignored by training logic and consumed by the job worker executor.
execution:
  deucalion:
    command_mode: run
    gpus: 0
    account: f202508843cpcaa0x
    partition: normal-x86
    time: "00:10:00"
    cpus_per_task: 4
    mem_gb: 8
    sif_path: /projects/F202508843CPCAA0/tiagocalof/images/simulator.sif
    modules: []
    datasets:
      - datasets/citylearn_charging_constraints_demo
    required_paths:
      - /projects/F202508843CPCAA0/tiagocalof/images/simulator.sif
