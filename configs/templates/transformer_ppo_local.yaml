# Local TransformerPPO template.

# Human-readable experiment metadata used across MLflow, logs, and manifests.
metadata:
  experiment_name: "transformer_ppo_local_template"
  run_name: "TransformerPPO Local"

# Runtime values are injected automatically by run_experiment.py.
runtime:
  log_dir: null
  job_dir: null
  mlflow_uri: null
  job_id: null
  run_id: null
  run_name: null
  tracking_uri: null
  experiment_id: null
  mlflow_run_url: null

# Tracking controls for metrics/log verbosity and MLflow enablement.
tracking:
  mlflow_enabled: true
  log_level: "INFO"
  log_frequency: 1
  mlflow_step_sample_interval: 10
  mlflow_artifacts_profile: minimal
  progress_updates_enabled: true
  progress_update_interval: 5
  system_metrics_enabled: false
  system_metrics_interval: 10

# Checkpoint behavior for saving and optional resume/fine-tuning workflows.
checkpointing:
  resume_training: false
  checkpoint_run_id: null
  checkpoint_artifact: "latest_checkpoint.pth"
  use_best_checkpoint_artifact: false
  reset_replay_buffer: false
  freeze_pretrained_layers: false
  fine_tune: false
  checkpoint_interval: 5000

# Bundle metadata/options consumed by inference-side artifact loading.
bundle:
  bundle_version: null
  description: null
  alias_mapping_path: null
  require_observations_envelope: false
  artifact_config: {}
  per_agent_artifact_config: {}

# Simulator wiring: local dataset path.
simulator:
  dataset_name: citylearn_challenge_2022_phase_all_plus_evs
  dataset_path: ./datasets/citylearn_challenge_2022_phase_all_plus_evs/schema.json
  central_agent: false
  reward_function: V2GPenaltyReward
  episodes: 1
  simulation_start_time_step: null
  simulation_end_time_step: null
  episode_time_steps: null
  export:
    mode: none
    export_kpis_on_episode_end: true
    session_name: null

# Training schedule knobs used by the wrapper/agent update cadence.
training:
  seed: 123
  steps_between_training_updates: 1
  target_update_interval: 0

# Topology is environment-derived at runtime.
topology:
  num_agents: null
  observation_dimensions: null
  action_dimensions: null
  action_space: null

# Algorithm family and hyperparameters.
algorithm:
  name: "AgentTransformerPPO"

  transformer:
    d_model: 64
    nhead: 4
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.1

  hyperparameters:
    learning_rate: 3.0e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_eps: 0.2
    ppo_epochs: 4
    minibatch_size: 64
    entropy_coeff: 0.01
    value_coeff: 0.5
    max_grad_norm: 0.5
    min_steps_before_update: 0

  tokenizer:
    ca_types:
      # EV charger CA type.
      # CityLearn actual naming puts the device ID (e.g. charger_1_1) in the
      # middle of each feature name.  The patterns below are substrings that
      # match the actual names produced by CityLearn's loading pipeline.
      ev_charger:
        features:
          - connected_state               # matches electric_vehicle_charger_charger_X_Y_connected_state
          - departure_time                # matches connected_electric_vehicle_at_charger_charger_X_Y_departure_time
          - required_soc_departure        # matches connected_electric_vehicle_at_charger_charger_X_Y_required_soc_departure
          - _soc                            # matches connected_electric_vehicle_at_charger_charger_X_Y_soc
          - battery_capacity              # matches connected_electric_vehicle_at_charger_charger_X_Y_battery_capacity
          - incoming_state                # matches electric_vehicle_charger_charger_X_Y_incoming_state
          - arrival_time                  # matches incoming_electric_vehicle_at_charger_charger_X_Y_estimated_arrival_time
        action_name: electric_vehicle_storage

      battery:
        features:
          - electrical_storage_soc
        action_name: electrical_storage

      washing_machine:
        features:
          - start_time_step               # matches washing_machine_X_start_time_step
          - end_time_step                 # matches washing_machine_X_end_time_step
        action_name: washing_machine

    sro_types:
      temporal:
        features:
          - month
          - hour
          - day_type
          - daylight_savings_status
      weather:
        features:
          - outdoor_dry_bulb_temperature
          - outdoor_relative_humidity
          - diffuse_solar_irradiance
          - direct_solar_irradiance
      pricing:
        features:
          - electricity_pricing
      carbon:
        features:
          - carbon_intensity

    rl:
      demand_feature: non_shiftable_load
      generation_features:
        - solar_generation
      extra_features:
        - net_electricity_consumption

# Optional worker-specific overrides; omitted for local execution.
execution: null
