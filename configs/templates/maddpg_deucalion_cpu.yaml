# Deucalion CPU MADDPG template.

# Human-readable experiment metadata used across MLflow, logs, and manifests.
metadata:
  experiment_name: "maddpg_deucalion_cpu_template"
  run_name: "MADDPG Deucalion CPU"

# Runtime values are injected automatically by run_experiment.py.
runtime:
  log_dir: null
  job_dir: null
  mlflow_uri: null
  job_id: null
  run_id: null
  run_name: null

# Tracking controls for metrics/log verbosity and MLflow enablement.
tracking:
  mlflow_enabled: true
  log_level: "INFO"
  log_frequency: 1

# Checkpoint behavior for saving and optional resume/fine-tuning workflows.
checkpointing:
  resume_training: false
  checkpoint_run_id: null
  checkpoint_artifact: "latest_checkpoint.pth"
  use_best_checkpoint_artifact: false
  reset_replay_buffer: false
  freeze_pretrained_layers: false
  fine_tune: false
  checkpoint_interval: 5000

# Bundle metadata/options consumed by inference-side artifact loading.
bundle:
  bundle_version: "2026-03-10-v1"
  description: "MADDPG Deucalion CPU template"
  alias_mapping_path: null
  require_observations_envelope: false
  artifact_config: {}

# Simulator wiring: /data paths are required inside worker containers/SIF jobs.
simulator:
  dataset_name: citylearn_charging_constraints_demo
  dataset_path: /data/datasets/citylearn_charging_constraints_demo/schema.json
  central_agent: false
  reward_function: RewardFunction
  # Optional simulation window overrides (null = dataset schema defaults).
  simulation_start_time_step: null
  simulation_end_time_step: null
  episode_time_steps: null
  # Export controls for simulator CSV/KPI outputs.
  export:
    mode: none
    export_kpis_on_episode_end: false
    session_name: null

# Training schedule knobs used by the wrapper/agent update cadence.
training:
  seed: 22
  end_initial_exploration_time_step: 100
  end_exploration_time_step: 200
  steps_between_training_updates: 5
  target_update_interval: 2

# Topology is environment-derived at runtime.
topology:
  num_agents: null
  observation_dimensions: null
  action_dimensions: null
  action_space: null

# Algorithm family and hyperparameters.
algorithm:
  name: "MADDPG"
  hyperparameters:
    gamma: 0.99
  networks:
    actor:
      class: "Actor"
      layers: [512, 256, 128]
      lr: 1.0e-4
    critic:
      class: "Critic"
      layers: [512, 256, 128]
      lr: 1.0e-3
  replay_buffer:
    class: "MultiAgentReplayBuffer"
    capacity: 50000
    batch_size: 256
  exploration:
    strategy: "GaussianNoise"
    params:
      bias: 0.3
      sigma: 0.2
      decay: 0.995
      gamma: 0.99
      tau: 0.001

# Optional worker-specific overrides used by the Deucalion executor.
execution:
  deucalion:
    command_mode: run
    gpus: 0
    account: f202508843cpcaa0x
    partition: normal-x86
    time: "00:10:00"
    cpus_per_task: 4
    mem_gb: 8
    sif_path: /projects/F202508843CPCAA0/tiagocalof/images/simulator.sif
    modules: []
    datasets:
      - datasets/citylearn_charging_constraints_demo
    required_paths:
      - /projects/F202508843CPCAA0/tiagocalof/images/simulator.sif
