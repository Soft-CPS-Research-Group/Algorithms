metadata:
  experiment_name: "rbc_community_15min_local"
  run_name: "RBCCommunityPolicy 15min"
  community_name: "citylearn_static_15min"
  description: "Community-aware rule-based baseline on the static 15-minute dataset"

tracking:
  mlflow_enabled: false
  log_level: "INFO"
  log_frequency: 2048
  progress_update_interval: 2048
  runtime_profiling_enabled: true
  runtime_profiling_interval: 512

simulator:
  dataset_name: citylearn_three_phase_electrical_service_demo_15min_parquet
  dataset_path: ./datasets/citylearn_three_phase_electrical_service_demo_15min_parquet/schema.json
  central_agent: false
  interface: entity
  topology_mode: static
  entity_encoding:
    enabled: true
    normalization: minmax_space
    clip: true
  community_market:
    enabled: true
    local_price_ratio_to_grid_import: 0.8
    intra_community_sell_ratio: 0.8
    grid_export_price: 0.0
    import_member_weights: {}
    kpis:
      community_local_traded_enabled: true
      community_self_consumption_enabled: true
  reward_function: CostHardConstraintReward
  reward_function_kwargs:
    export_credit_ratio: 0.0
    local_cost_weight: 0.0
    grid_violation_penalty: 60.0
    power_outage_penalty: 120.0
    ev_departure_window_hours: 1.0
    ev_departure_service_tolerance: 0.05
    ev_connected_deficit_penalty: 30.0
    ev_schedule_deficit_penalty: 120.0
    ev_departure_deficit_penalty: 120.0
    ev_departure_missed_penalty: 250.0
    battery_soc_min: 0.0
    battery_soc_max: 1.0
    use_observed_storage_soc_limits: true
    battery_soc_violation_penalty: 30.0
    battery_throughput_penalty: 0.2
    deferrable_deadline_missed_penalty: 100.0
    deferrable_urgency_penalty: 10.0
    community_import_penalty: 0.01
    community_peak_import_penalty: 0.001
    community_export_penalty: 0.0
    community_penalty_divide_by_agents: true
    community_settlement_cost_weight: 1.0
    community_local_price_ratio: 0.8
    community_grid_export_price: 0.0
    scale_state_penalties_by_time_step: true
    state_penalty_reference_seconds: 3600.0
  episodes: 1
  simulation_start_time_step: 0
  simulation_end_time_step: 35039
  episode_time_steps: 35040
  export:
    mode: end
    export_kpis_on_episode_end: true
    final_episode_only: true
    kpis_final_episode_only: true
    timeseries_final_episode_only: true
    include_business_as_usual: true
    export_business_as_usual_timeseries: false
    kpi_round_decimals: null
    session_name: "rbc-community-15min-local"

training:
  seed: 123
  steps_between_training_updates: 1
  target_update_interval: 0

pipeline:
- algorithm: RBCCommunityPolicy
  count: 1
  hyperparameters:
    allow_v2g: true
    flexibility_hours: 3.0
    emergency_hours: 1.0
    flex_trickle_charge: 0.0
    emergency_charge_rate: 1.0
    ev_price_charge_rate: 0.7
    ev_pv_charge_rate: 0.85
    ev_community_charge_rate: 0.85
    ev_v2g_discharge_rate: 0.18
    community_v2g_discharge_rate: 0.12
    ev_v2g_reserve_soc: 0.0
    ev_service_margin_rate: 0.05
    ev_service_floor_rate: 0.25
    ev_service_lookahead_hours: 4.0
    ev_service_target_soc: 0.0
    ev_deadline_buffer_hours: 0.25
    ev_v2g_min_departure_hours: 1.0
    ev_v2g_service_margin_soc: 0.02
    ev_v2g_buffer_soc: 0.12
    ev_subhour_service_guard_steps: 4.0
    ev_subhour_deadline_buffer_steps: 1.0
    ev_subhour_v2g_guard_steps: 4.0
    ev_subhour_min_service_margin_rate: 0.05
    ev_subhour_v2g_reserve_soc: 0.0
    price_charge_rate: 0.0
    price_discharge_rate: 0.15
    pv_charge_rate: 0.45
    peak_discharge_rate: 0.25
    community_storage_charge_rate: 0.55
    community_storage_discharge_rate: 0.28
    community_surplus_charge_soc_ceiling: 0.7
    storage_min_soc: 0.35
    storage_max_soc: 0.8
    storage_target_soc: 0.65
    storage_price_charge_soc_ceiling: 0.6
    storage_price_discharge_soc_floor: 0.4
    storage_peak_discharge_soc_floor: 0.4
    storage_discharge_import_threshold_kw: 0.5
    community_local_price_ratio: 0.8
    community_grid_export_price: 0.0
    pv_surplus_threshold_kw: 0.5
    community_surplus_threshold_kw: 0.5
    import_peak_threshold_kw: 10.0
    community_import_threshold_kw: 10.0
    low_headroom_threshold_kw: 1.0
    deferrable_start_action: 1.0
    deferrable_urgency_threshold: 0.6
    deferrable_slack_threshold: 0.4
    deferrable_safety_margin_steps: 1.0
    deferrable_import_block_threshold_kw: 2.0
    deferrable_community_import_block_threshold_kw: 8.0
