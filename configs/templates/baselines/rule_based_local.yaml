# Local RuleBasedPolicy template.

# Human-readable experiment metadata used across MLflow, logs, and manifests.
metadata:
  experiment_name: "rule_based_local_template"
  run_name: "Rule Based Local"
  community_name: "default_community"
  description: "Rule-based template run"

# Runtime values are injected automatically by run_experiment.py.
runtime:
  log_dir: null
  job_dir: null
  mlflow_uri: null
  job_id: null
  run_id: null
  run_name: null
  tracking_uri: null
  experiment_id: null
  mlflow_run_url: null

# Tracking controls for metrics/log verbosity and MLflow enablement.
tracking:
  mlflow_enabled: false
  log_level: "INFO"
  log_frequency: 1
  mlflow_step_sample_interval: 10
  mlflow_artifacts_profile: minimal
  progress_updates_enabled: true
  progress_update_interval: 5
  system_metrics_enabled: false
  system_metrics_interval: 10

# Checkpoint behavior for saving and optional resume/fine-tuning workflows.
checkpointing:
  resume_training: false
  checkpoint_run_id: null
  checkpoint_artifact: "rule_based_checkpoint.json"
  use_best_checkpoint_artifact: false
  reset_replay_buffer: false
  freeze_pretrained_layers: false
  fine_tune: false
  checkpoint_interval: null

# Bundle metadata/options consumed by inference-side artifact loading.
bundle:
  bundle_version: null
  description: null
  alias_mapping_path: null
  require_observations_envelope: false
  artifact_config: {}
  per_agent_artifact_config: {}

# Simulator wiring: local dataset path.
simulator:
  dataset_name: citylearn_three_phase_electrical_service_demo_15s_parquet
  dataset_path: ./datasets/citylearn_three_phase_electrical_service_demo_15s_parquet/schema.json
  central_agent: false
  interface: entity
  topology_mode: static
  entity_encoding:
    enabled: true
    normalization: minmax_space
    clip: true
  reward_function: CostHardConstraintReward
  reward_function_kwargs:
    grid_power_limit_kw: 100.0
    grid_violation_penalty: 60.0
    power_outage_penalty: 120.0
    ev_departure_window_hours: 1.0
    ev_departure_service_tolerance: 0.05
    ev_connected_deficit_penalty: 30.0
    ev_schedule_deficit_penalty: 120.0
    ev_departure_deficit_penalty: 120.0
    ev_departure_missed_penalty: 250.0
    battery_soc_min: 0.0
    battery_soc_max: 1.0
    use_observed_storage_soc_limits: true
    battery_soc_violation_penalty: 20.0
    battery_throughput_penalty: 0.2
    deferrable_deadline_missed_penalty: 100.0
    deferrable_urgency_penalty: 10.0
    community_import_penalty: 0.01
    community_peak_import_penalty: 0.001
    community_export_penalty: 0.0
    community_penalty_divide_by_agents: true
  episodes: 1
  # Optional simulation window overrides (null = dataset schema defaults).
  simulation_start_time_step: 0
  simulation_end_time_step: 5759
  episode_time_steps: 5760
  # Export controls for simulator CSV/KPI outputs.
  export:
    mode: end
    export_kpis_on_episode_end: true
    session_name: null
  wrapper_reward:
    enabled: true
    profile: cost_limits_v1
    clip_enabled: true
    clip_min: -10.0
    clip_max: 10.0
    squash: none

# Training schedule knobs used by the wrapper/agent update cadence.
training:
  seed: 22
  steps_between_training_updates: 1
  target_update_interval: 0

# Topology is environment-derived at runtime.
topology:
  num_agents: null
  observation_dimensions: null
  action_dimensions: null
  action_space: null

# Algorithm family and hyperparameters.
algorithm:
  name: "RuleBasedPolicy"
  hyperparameters:
    pv_charge_threshold: 2.0
    flexibility_hours: 3.0
    emergency_hours: 1.0
    pv_preferred_charge_rate: 0.7
    flex_trickle_charge: 0.0
    min_charge_rate: 0.0
    emergency_charge_rate: 1.0
    default_capacity_kwh: 60.0
    non_flexible_chargers: []
    control_evs: true
    control_deferrables: true
    deferrable_start_action: 1.0
    deferrable_urgency_threshold: 0.75
    deferrable_slack_threshold: 0.25
    deferrable_priority_threshold: 0.5
  networks: null
  replay_buffer: null
  exploration: null

# Optional worker-specific overrides; omitted for local execution.
execution: null
