# Local RuleBasedPolicy template for entity interface with dynamic topology.

metadata:
  experiment_name: "rule_based_entity_dynamic_template"
  run_name: "Rule Based Entity Dynamic Local"
  community_name: "default_community"
  description: "Entity+dynamic topology template run"

runtime:
  log_dir: null
  job_dir: null
  mlflow_uri: null
  job_id: null
  run_id: null
  run_name: null
  tracking_uri: null
  experiment_id: null
  mlflow_run_url: null

tracking:
  mlflow_enabled: true
  log_level: "INFO"
  log_frequency: 1
  mlflow_step_sample_interval: 10
  mlflow_artifacts_profile: minimal
  progress_updates_enabled: true
  progress_update_interval: 5
  system_metrics_enabled: false
  system_metrics_interval: 10

checkpointing:
  resume_training: false
  checkpoint_run_id: null
  checkpoint_artifact: "rule_based_checkpoint.json"
  use_best_checkpoint_artifact: false
  reset_replay_buffer: false
  freeze_pretrained_layers: false
  fine_tune: false
  checkpoint_interval: null

bundle:
  bundle_version: null
  description: null
  alias_mapping_path: null
  require_observations_envelope: false
  artifact_config: {}
  per_agent_artifact_config: {}

simulator:
  dataset_name: citylearn_three_phase_dynamic_topology_demo
  dataset_path: ./datasets/citylearn_three_phase_dynamic_topology_demo/schema.json
  central_agent: false
  interface: entity
  topology_mode: dynamic
  entity_encoding:
    enabled: true
    normalization: minmax_space
    clip: true
  reward_function: RewardFunction
  reward_function_kwargs: {}
  episodes: 1
  # Keep a shorter window for local smoke/debug.
  simulation_start_time_step: 0
  simulation_end_time_step: 3400
  episode_time_steps: 3401
  export:
    mode: end
    export_kpis_on_episode_end: true
    session_name: null
  wrapper_reward:
    enabled: false
    profile: cost_limits_v1
    clip_enabled: true
    clip_min: -10.0
    clip_max: 10.0
    squash: none

training:
  seed: 22
  steps_between_training_updates: 1
  target_update_interval: 0

topology:
  num_agents: null
  observation_dimensions: null
  action_dimensions: null
  action_space: null

algorithm:
  name: "RuleBasedPolicy"
  hyperparameters:
    pv_charge_threshold: 2.0
    flexibility_hours: 3.0
    emergency_hours: 1.0
    pv_preferred_charge_rate: 0.7
    flex_trickle_charge: 0.0
    min_charge_rate: 0.0
    emergency_charge_rate: 1.0
    default_capacity_kwh: 60.0
    non_flexible_chargers: []
  networks: null
  replay_buffer: null
  exploration: null

execution: null
