# Community Coordinator Level 2 — local development template.
#
# Phase 2: Per-Building Price Multipliers
# CC observes community aggregates + per-building state (SoC, PV, net power).
# Emits one continuous price multiplier per building:
#   multipliers[i] ∈ [price_min, price_max]
#   > 1.0 → "energy more expensive" → building i reduces consumption
#   = 1.0 → neutral
#   < 1.0 → "energy cheaper"        → building i increases consumption
#
# Observation: 16 district features + 6 per-building features × 17 = 118 total.
#   Per-building: storage::soc, pv::generation_power_kw, net_power_kw,
#                 ev_connected, ev_soc_deficit, ev_departure_urgency
# Action:      List[float] of length 17, one multiplier per building.
# Low-level:   SignalAwareRBC (unchanged — Ensemble routes context[i] to building i).

metadata:
  experiment_name: "cc_level2"
  run_name: "CC-L2 Per-Building Multipliers"

runtime:
  log_dir: null
  job_dir: null
  mlflow_uri: null
  job_id: null
  run_id: null
  run_name: null
  tracking_uri: null
  experiment_id: null
  mlflow_run_url: null

tracking:
  mlflow_enabled: true
  log_level: "INFO"
  log_frequency: 1
  mlflow_step_sample_interval: 50
  mlflow_artifacts_profile: minimal
  progress_updates_enabled: true
  progress_update_interval: 5
  system_metrics_enabled: false
  system_metrics_interval: 10

checkpointing:
  resume_training: false
  checkpoint_run_id: null
  checkpoint_artifact: "latest_checkpoint.pth"
  use_best_checkpoint_artifact: false
  reset_replay_buffer: false
  freeze_pretrained_layers: false
  fine_tune: false
  checkpoint_interval: 960

bundle:
  bundle_version: null
  description: null
  alias_mapping_path: null
  require_observations_envelope: false
  artifact_config: {}

simulator:
  dataset_name: citylearn_three_phase_electrical_service_demo_15min_parquet
  dataset_path: ./datasets/citylearn_three_phase_electrical_service_demo_15min_parquet/schema.json
  central_agent: false
  interface: entity
  topology_mode: static
  entity_encoding:
    enabled: true
    normalization: minmax_space
    profile: cc_level2          # 6 per-building feats: soc, pv, net, ev_conn, soc_def, urgency
    clip: true
  reward_function: CCRewardLevel2
  episodes: 70
  simulation_start_time_step: null
  simulation_end_time_step: null
  episode_time_steps: 34944     # full year per ep (dataset total = 34944 steps)
  export:
    mode: end
    export_kpis_on_episode_end: true
    session_name: null

training:
  seed: 22
  steps_between_training_updates: 1
  target_update_interval: 2

topology:
  num_agents: null
  observation_dimensions: null
  action_dimensions: null
  action_space: null

# Two-stage pipeline: CCLevel2 manager → SignalAwareRBC workers (17 buildings).
# The Ensemble distributes context[i] to building i automatically.
pipeline:
  - algorithm: "CCLevel2"
    count: 1
    hyperparameters:
      # 118-dimensional context:
      #   [0-15]   district features (time, pricing, carbon, community power)
      #   [16-117] per-building features × 17:
      #              [0] storage::soc          [0,1]
      #              [1] pv::generation_power_kw [0,1]
      #              [2] net_power_kw           [-1,1] (signed)
      #              [3] ev connected_state     {0,1}
      #              [4] ev soc_deficit         [0,1]
      #              [5] ev departure_urgency   [0,1]
      c_dim: 118
      num_buildings: 17
      hidden_dims: [256, 256]

      # Price multiplier action range.
      price_min: 0.5
      price_max: 1.5

      # Temporal abstraction: CC decides every hour over 15-minute steps.
      cc_action_interval: 4

      # Rollout buffer.
      num_steps: 96

      # Optimiser
      lr: 1.0e-4

      # Discount & GAE
      gamma: 0.99
      gae_lambda: 0.95

      # PPO update
      num_epochs: 10
      mini_batch_size: 64
      clip_coef: 0.2
      vf_coef: 1.0
      ent_coef: 0.05

      # Auxiliary reward weights (factor + smoothness penalty, averaged over buildings)
      w_factor: 0.3
      w_smoothness: 0.02
      max_grad_norm: 0.5
      target_kl: 0.1

      # Behaviour-cloning warm-start.
      # Teacher mirrors CCRewardLevel2: community signal + EV urgency modulation.
      #   high price when EV needs charging urgently → lower multiplier to allow charging
      bc_pretrain_enabled: true
      bc_collect_steps: 8736       # full year (34944 env steps / cc_action_interval=4)
      bc_train_steps: 2000
      bc_lr: 1.0e-3
      bc_dt_hours: 0.25            # timestep size for kW → kWh conversion
      # Community weights — must match CCRewardLevel2
      bc_w_cost: 1.0
      bc_w_peak: 0.3
      bc_w_export: 0.1
      # Per-building EV modulation — mirrors CCRewardLevel2 w_ev
      bc_w_soc: 0.2               # legacy SoC modulation (pre-EV-redesign; TODO: remove)
      bc_w_net: 0.1               # legacy net modulation  (pre-EV-redesign; TODO: remove)
      bc_w_ev: 0.5                # EV urgency → lower mult when gap·urgency is high
      # Must match CCRewardLevel2.urgency_horizon exactly.
      # The encoded obs feature uses a 24h horizon; we invert it to recover actual
      # hours and re-apply this horizon so teacher and reward are on the same scale.
      bc_urgency_horizon: 4.0
      bc_mult_scale: 1.0          # scale raw signal before ±0.8 clip
      # Reference values auto-calibrated from episode-0 data.
      # Uncomment to override:
      # bc_target_import: 4.14
      # bc_reference_peak: 2.72
      # bc_reference_export: 7.52

  - algorithm: SignalAwareRBC
    count: 17

execution: null
