# 1-episode smoke variant of district_data_collection_local.yaml.
# Used to sanity-check wiring (reward, attach_environment, CSV writer)
# before running the full 10-episode collection.

metadata:
  experiment_name: "district_data_collection_smoke"
  run_name: "District Data Collection RBC (smoke)"

runtime:
  log_dir: null
  job_dir: null
  mlflow_uri: null
  job_id: null
  run_id: null
  run_name: null
  tracking_uri: null
  experiment_id: null
  mlflow_run_url: null

tracking:
  mlflow_enabled: false
  log_level: "INFO"
  log_frequency: 1
  mlflow_step_sample_interval: 10
  mlflow_artifacts_profile: minimal
  progress_updates_enabled: true
  progress_update_interval: 50
  system_metrics_enabled: false
  system_metrics_interval: 10

checkpointing:
  resume_training: false
  checkpoint_run_id: null
  checkpoint_artifact: "checkpoint.pth"
  use_best_checkpoint_artifact: false
  reset_replay_buffer: false
  freeze_pretrained_layers: false
  fine_tune: false
  checkpoint_interval: null

bundle:
  bundle_version: null
  description: "Smoke test (1 episode, 96 steps)."
  alias_mapping_path: null
  require_observations_envelope: false
  artifact_config: {}
  per_agent_artifact_config: {}

simulator:
  dataset_name: citylearn_three_phase_dynamic_topology_demo_v1
  dataset_path: ./datasets/citylearn_three_phase_dynamic_topology_demo_v1/schema.json
  central_agent: false
  reward_function: V2GPenaltyReward
  episodes: 1
  simulation_start_time_step: 0
  simulation_end_time_step: 95
  episode_time_steps: null
  export:
    mode: none
    export_kpis_on_episode_end: false
    session_name: null

training:
  seed: 22
  steps_between_training_updates: 1
  target_update_interval: 0

topology:
  num_agents: null
  observation_dimensions: null
  action_dimensions: null
  action_space: null

algorithm:
  name: "DistrictDataCollectionRBC"
  hyperparameters:
    noise_sigma: 0.1
    noisy_episode_indices: [0]
    seed: 22
    rbc_hyperparameters: {}
  networks: null
  replay_buffer: null
  exploration: null

execution: null
