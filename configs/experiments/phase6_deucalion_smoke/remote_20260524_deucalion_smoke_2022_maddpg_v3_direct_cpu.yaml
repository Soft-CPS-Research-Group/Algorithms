metadata:
  experiment_name: remote_20260524_deucalion_smoke_2022_maddpg_v3_direct_cpu
  run_name: remote 20260524 deucalion smoke 2022 maddpg v3 direct cpu
  community_name: citylearn_2022
  description: CPU smoke for Simulator 1.0.2 plus optimized direct entity->maddpg_v3 observation path.

runtime:
  log_dir: null
  job_dir: null
  mlflow_uri: null
  job_id: null
  run_id: null
  run_name: null
  tracking_uri: null
  experiment_id: null
  mlflow_run_url: null

tracking:
  mlflow_enabled: false
  log_level: INFO
  log_frequency: 32
  mlflow_step_sample_interval: 32
  mlflow_artifacts_profile: minimal
  progress_updates_enabled: true
  progress_update_interval: 32
  system_metrics_enabled: false
  system_metrics_interval: 10
  action_diagnostics_enabled: false
  action_diagnostics_detail: summary
  action_saturation_tolerance: 0.01
  action_idle_tolerance: 0.02
  training_diagnostics_enabled: false
  training_diagnostics_detail: summary
  reward_diagnostics_enabled: false
  reward_diagnostics_detail: summary
  runtime_profiling_enabled: true
  runtime_profiling_interval: 32
  runtime_profiling_detail: summary

checkpointing:
  resume_training: false
  checkpoint_run_id: null
  checkpoint_artifact: latest_checkpoint.pth
  use_best_checkpoint_artifact: false
  reset_replay_buffer: false
  freeze_pretrained_layers: false
  fine_tune: false
  checkpoint_interval: null
  require_update_step: true
  require_initial_exploration_done: true

bundle:
  bundle_version: null
  description: Deucalion CPU smoke bundle for optimized MADDPG entity observations.
  alias_mapping_path: null
  require_observations_envelope: false
  artifact_config: {}
  per_agent_artifact_config: {}

simulator:
  dataset_name: citylearn_challenge_2022_phase_all_plus_evs
  dataset_path: ./datasets/citylearn_challenge_2022_phase_all_plus_evs/schema.json
  central_agent: false
  interface: entity
  topology_mode: static
  entity_encoding:
    enabled: true
    normalization: minmax_space
    profile: maddpg_v3_operational
    clip: true
  reward_function: CostHardConstraintReward
  reward_function_kwargs:
    export_credit_ratio: 0.0
    local_cost_weight: 1.0
    grid_violation_penalty: 60.0
    power_outage_penalty: 120.0
    ev_departure_window_hours: 1.0
    ev_departure_service_tolerance: 0.05
    ev_over_service_tolerance: 0.05
    ev_over_service_penalty: 0.0
    ev_connected_deficit_penalty: 30.0
    ev_schedule_deficit_penalty: 120.0
    ev_v2g_service_penalty: 0.0
    ev_departure_deficit_penalty: 120.0
    ev_departure_missed_penalty: 250.0
    battery_soc_min: 0.0
    battery_soc_max: 1.0
    use_observed_storage_soc_limits: true
    battery_soc_violation_penalty: 30.0
    battery_throughput_penalty: 0.2
    deferrable_deadline_missed_penalty: 100.0
    deferrable_urgency_penalty: 10.0
    community_import_penalty: 0.01
    community_peak_import_penalty: 0.001
    community_export_penalty: 0.0
    community_penalty_divide_by_agents: true
    community_settlement_cost_weight: 0.0
    community_local_price_ratio: 0.8
    community_grid_export_price: 0.0
    scale_state_penalties_by_time_step: true
    state_penalty_reference_seconds: 3600.0
  episodes: 1
  deterministic_finish: false
  simulation_start_time_step: 0
  simulation_end_time_step: 255
  episode_time_steps: 256
  export:
    mode: end
    export_kpis_on_episode_end: false
    final_episode_only: true
    include_business_as_usual: false
    export_business_as_usual_timeseries: false
    kpi_round_decimals: null
    session_name: remote_20260524_deucalion_smoke_2022_maddpg_v3_direct_cpu
  wrapper_reward:
    enabled: false
    profile: cost_limits_v1
    clip_enabled: true
    clip_min: -10.0
    clip_max: 10.0
    squash: none

training:
  seed: 123
  steps_between_training_updates: 4
  target_update_interval: 2

topology:
  num_agents: null
  observation_dimensions: null
  action_dimensions: null
  action_space: null

algorithm:
  name: MADDPG
  hyperparameters:
    gamma: 0.995
    seed: 123
  networks:
    actor:
      class: Actor
      layers: [1024, 512, 256]
      lr: 5.0e-5
    critic:
      class: Critic
      layers: [1024, 512, 256]
      lr: 5.0e-4
  replay_buffer:
    class: MultiAgentReplayBuffer
    capacity: 200000
    batch_size: 256
  exploration:
    strategy: GaussianNoise
    params:
      bias: 0.0
      sigma: 0.15
      decay: 0.9995
      min_sigma: 0.03
      noise_clip: 0.3
      storage_exploration_noise_multiplier: 1.0
      ev_negative_exploration_noise_multiplier: 1.0
      gamma: 0.99
      tau: 0.001
      use_amp: false
      end_initial_exploration_time_step: 96
      random_exploration_steps: 96
      initial_exploration_strategy: uniform_full_range
      warm_start_policy: null
      warm_start_policy_deterministic: true
      warm_start_policy_noise_scale: 0.0
      warm_start_policy_phaseout_steps: 0
      warm_start_policy_phaseout_mode: probability
      train_during_initial_exploration: false
      initial_exploration_training_start_step: 0
      noop_noise_scale: 0.15
      deferrable_on_probability: 0.2
      deferrable_trigger_threshold: 0.5
      noop_actor_initialization: false
      noop_actor_initialization_epsilon: 0.05
      critic_update_mode: joint_mean
      actor_update_interval: 1
      target_policy_smoothing: false
      target_policy_noise: 0.05
      target_policy_noise_clip: 0.10
      actor_action_l2_penalty: 0.0
      actor_action_saturation_penalty: 0.0
      actor_storage_action_l2_penalty: 0.0
      actor_ev_v2g_action_l2_penalty: 0.0
      actor_action_saturation_threshold: 0.85
      actor_behavior_cloning_weight: 0.0
      actor_ev_behavior_cloning_multiplier: 1.0
      actor_storage_behavior_cloning_multiplier: 1.0
      actor_behavior_cloning_min_weight: 0.0
      actor_behavior_cloning_decay_start_step: 0
      actor_behavior_cloning_decay_steps: 0
      reward_normalization: true
      reward_normalization_clip: 10.0
      reward_normalization_epsilon: 1.0e-8

execution: null
