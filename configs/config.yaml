# -----------------------------------------------------------------------------
# Canonical training config.
# Keep this file as the single non-template config under configs/.
# -----------------------------------------------------------------------------

# Human-readable experiment metadata used across MLflow, logs, and manifests.
metadata:
  experiment_name: "maddpg_local_default"
  run_name: "MADDPG Local Run"
  community_name: null

# Runtime values are injected automatically by run_experiment.py.
# Leave them null in version-controlled config files.
runtime:
  log_dir: null
  job_dir: null
  mlflow_uri: null
  job_id: null
  run_id: null
  run_name: null
  tracking_uri: null
  experiment_id: null
  mlflow_run_url: null

# Tracking controls for metrics/log verbosity and MLflow enablement.
tracking:
  mlflow_enabled: true
  log_level: "INFO"
  log_frequency: 1
  mlflow_step_sample_interval: 10
  mlflow_artifacts_profile: minimal
  # Progress file writes can be throttled or disabled for lighter I/O.
  progress_updates_enabled: true
  progress_update_interval: 5
  # System metrics are useful for debug but expensive; disabled by default.
  system_metrics_enabled: false
  system_metrics_interval: 10

# Checkpoint behavior for saving and optional resume/fine-tuning workflows.
checkpointing:
  resume_training: false
  checkpoint_run_id: null
  checkpoint_artifact: "latest_checkpoint.pth"
  use_best_checkpoint_artifact: false
  reset_replay_buffer: false
  freeze_pretrained_layers: false
  fine_tune: false
  checkpoint_interval: 5000

# Bundle metadata/options consumed by inference-side artifact loading.
bundle:
  bundle_version: null
  description: null
  alias_mapping_path: null
  require_observations_envelope: false
  artifact_config: {}
  # Default single-building run: no per-agent override required.
  per_agent_artifact_config: {}

# Simulator wiring: dataset schema path, agent mode, and reward implementation.
simulator:
  dataset_name: citylearn_challenge_2022_phase_all_plus_evs
  dataset_path: ./datasets/citylearn_challenge_2022_phase_all_plus_evs/schema.json
  central_agent: false
  reward_function: CostHardConstraintReward
  reward_function_kwargs:
    export_credit_ratio: 0.8
    grid_violation_penalty: 60.0
    power_outage_penalty: 120.0
    ev_departure_window_hours: 1.0
    ev_departure_deficit_penalty: 120.0
    ev_departure_missed_penalty: 250.0
    battery_soc_min: 0.05
    battery_soc_max: 0.95
    battery_soc_violation_penalty: 30.0
    community_import_penalty: 0.0
  # Number of episodes executed by the training loop.
  episodes: 1
  # Optional simulation window overrides (null = dataset schema defaults).
  simulation_start_time_step: null
  simulation_end_time_step: null
  episode_time_steps: null
  # Export controls for simulator CSV/KPI outputs.
  export:
    mode: none
    export_kpis_on_episode_end: false
    session_name: null
  # Wrapper-only reward shaping profile (simulator remains untouched).
  wrapper_reward:
    enabled: false
    profile: cost_limits_v1
    clip_enabled: true
    clip_min: -10.0
    clip_max: 10.0
    squash: none

# Training schedule knobs used by the wrapper/agent update cadence.
training:
  seed: 22
  steps_between_training_updates: 5
  target_update_interval: 2

# Topology is environment-derived at runtime (do not hardcode values here).
topology:
  num_agents: null
  observation_dimensions: null
  action_dimensions: null
  action_space: null

# Algorithm family and hyperparameters.
algorithm:
  name: "MADDPG"
  hyperparameters:
    gamma: 0.99
  networks:
    actor:
      class: "Actor"
      layers: [1024, 512, 256]
      lr: 1.0e-4
    critic:
      class: "Critic"
      layers: [1024, 512, 256]
      lr: 1.0e-3
  replay_buffer:
    class: "MultiAgentReplayBuffer"
    capacity: 100000
    batch_size: 256
  exploration:
    strategy: "GaussianNoise"
    params:
      bias: 0.3
      sigma: 0.2
      decay: 0.995
      noise_clip: 0.3
      gamma: 0.99
      tau: 0.001
      end_initial_exploration_time_step: 100
      random_exploration_steps: 100

# Optional worker-specific overrides (e.g., Deucalion). Keep null for local runs.
execution: null
